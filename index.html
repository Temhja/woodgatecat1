<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <title>WoodGate — Catalog 2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     LOADER
════════════════════════════════════════════════════════════ -->
<div id="loader">
  <div class="l-icon">
    <svg viewBox="0 0 26 26" fill="none" width="30" height="30">
      <rect x="2"  y="2"  width="10" height="10" rx="1.5" stroke="#d4a017" stroke-width="1.6"/>
      <rect x="14" y="2"  width="10" height="10" rx="1.5" stroke="#d4a017" stroke-width="1.6"/>
      <rect x="2"  y="14" width="10" height="10" rx="1.5" stroke="#d4a017" stroke-width="1.6"/>
      <rect x="14" y="14" width="10" height="10" rx="1.5" stroke="#d4a017" stroke-width="1.6"/>
    </svg>
  </div>
  <div class="l-name">WoodGate</div>
  <div class="l-sub">Catalog 2026</div>
  <div class="l-bar-track">
    <div class="l-bar-fill"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     HOW-TO OVERLAY
════════════════════════════════════════════════════════════ -->
<div id="howto">
  <div class="hw-card">
    <div class="l-icon" style="width:44px;height:44px;">
      <svg viewBox="0 0 26 26" fill="none" width="26" height="26">
        <rect x="2"  y="2"  width="10" height="10" rx="1.5" stroke="#d4a017" stroke-width="1.6"/>
        <rect x="14" y="2"  width="10" height="10" rx="1.5" stroke="#d4a017" stroke-width="1.6"/>
        <rect x="2"  y="14" width="10" height="10" rx="1.5" stroke="#d4a017" stroke-width="1.6"/>
        <rect x="14" y="14" width="10" height="10" rx="1.5" stroke="#d4a017" stroke-width="1.6"/>
      </svg>
    </div>
    <div class="hw-title">WoodGate <span>Catalog</span></div>
    <div class="hw-sep"></div>
    <div class="hw-body">
      اسحب يميناً للصفحة التالية<br>
      اسحب يساراً للعودة للخلف<br>
      اضغط الأسهم أو النقاط للتنقل<br>
      أدخل رقم الصفحة للانتقال المباشر
    </div>
    <button class="hw-btn" id="hw-close">ابدأ التصفح</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- ═══════════════════════════════════════════════════════════
     APP
════════════════════════════════════════════════════════════ -->
<div id="app">

  <!-- Background layer (bg.jpg or gold glow) -->
  <div id="bg-layer"></div>

  <!-- ── TOP BAR ─────────────────────────────────────────── -->
  <div id="topbar">

    <div id="brand">
      <div class="bmark">
        <svg viewBox="0 0 22 22" fill="none" width="18" height="18">
          <rect x="2"  y="2"  width="8" height="8" rx="1" stroke="#d4a017" stroke-width="1.5"/>
          <rect x="12" y="2"  width="8" height="8" rx="1" stroke="#d4a017" stroke-width="1.5"/>
          <rect x="2"  y="12" width="8" height="8" rx="1" stroke="#d4a017" stroke-width="1.5"/>
          <rect x="12" y="12" width="8" height="8" rx="1" stroke="#d4a017" stroke-width="1.5"/>
        </svg>
      </div>
      <div>
        <div class="bname">WoodGate</div>
        <div class="bsub">Kitchen Doors</div>
      </div>
    </div>

    <div id="search-wrap">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <circle cx="5" cy="5" r="3.5" stroke="currentColor" stroke-width="1.2"/>
        <path d="M8 8L10.5 10.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <input id="search-input" type="number" min="1" max="170"
        placeholder="Go to page…"
        inputmode="numeric"
        autocomplete="off">
      <button id="search-go">Go</button>
    </div>

    <button id="fs-btn" onclick="WG.toggleFS()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M1.5 4V1.5H4M8 1.5H10.5V4M10.5 8V10.5H8M4 10.5H1.5V8"
          stroke="currentColor" stroke-width="1.2"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span id="fs-label">Full</span>
    </button>

  </div>

  <!-- ── STAGE ───────────────────────────────────────────── -->
  <div id="stage">
    <div id="book-scene">
      <div id="book">

        <!-- Static page layers -->
        <div class="pg-layer" id="pg-under"></div>
        <div class="pg-layer" id="pg-curr"></div>

        <!-- Flipper — the hard-flip card -->
        <div id="flipper">
          <div class="flip-face" id="flip-front"></div>
          <div class="flip-face" id="flip-back"></div>
        </div>

      </div>
    </div>
  </div>

  <!-- ── BOTTOM BAR ──────────────────────────────────────── -->
  <div id="bottombar">

    <!--
      RTL navigation:
      LEFT  chevron = BACK  (previous page in Arabic = right direction)
      RIGHT chevron = NEXT  (forward in Arabic = left direction)
      Arrows are intentionally swapped vs LTR to match RTL reading.
    -->
    <button class="ctrl" id="btn-back" disabled>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M9 2.5L4 7L9 11.5"
          stroke="currentColor" stroke-width="1.9"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <div id="nav-centre">
      <div id="dots-clip">
        <div id="dots-track"></div>
      </div>
      <div id="counter">1 / 170</div>
    </div>

    <button class="ctrl" id="btn-fwd">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M5 2.5L10 7L5 11.5"
          stroke="currentColor" stroke-width="1.9"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

  </div>

  <div id="swipe-hint">Swipe right = next &nbsp;·&nbsp; Swipe left = back</div>

</div>

<!-- ═══════════════════════════════════════════════════════════
     SCRIPTS
════════════════════════════════════════════════════════════ -->
<script src="flip.js"></script>

</body>
</html>
